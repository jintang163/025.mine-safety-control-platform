name: mine-gas-sensor
manufacturer: MineSafety
model: GJC4
description: 矿用瓦斯浓度传感器 - 测量范围0-4%CH4
labels:
  - gas
  - CH4
deviceResources:
  - name: gas_concentration
    description: 瓦斯浓度值 (CH4 %)
    properties:
      valueType: Float32
      readWrite: R
      minimum: 0
      maximum: 4
      defaultValue: 0
      unit: "% CH4"
    attributes:
      primaryTable: "HOLDING_REGISTERS"
      startingAddress: 0
      quantity: 2
      dataType: "FLOAT32"
      scale: 0.001

deviceCommands:
  - name: readGas
    isHidden: false
    readWrite: R
    resourceOperations:
      - deviceResource: gas_concentration

